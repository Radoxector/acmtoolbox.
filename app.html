<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ACM Unfolder</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    window.API_URL = 'https://acm-unfolder-api-production.h24111.workers.dev';
  </script>
</head>
<body>

  <script src="auth.js"></script>
  <script>
    if (!isAuthenticated()) { redirectToLogin(); }
  </script>

  <!-- ═══ HEADER ════════════════════════════════════════════════════════════ -->
  <header class="header">
    <div class="logo">ACM<em>Unfolder</em></div>
    <div class="header-file">
      <span class="fname" id="fileName">No model loaded</span>
    </div>
    <div class="header-right">
      <div class="user-chip">
        <span id="usernameDisplay">—</span>
        <span id="unfoldCounter" class="unfold-badge">—</span>
      </div>
      <div class="h-sep"></div>
      <button class="btn ghost btn-sm" id="toolkitsBtn" title="Back to dashboard">🏠</button>
      <button class="btn danger btn-sm" id="logoutBtn" title="Logout">↪</button>
    </div>
  </header>

  <!-- ═══ DESKTOP TAB BAR ══════════════════════════════════════════════════ -->
  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="3d" id="tab3d">
      <span class="tab-icon">⬡</span> 3D View
    </button>
    <button class="tab-btn" data-tab="2d" id="tab2d">
      <span class="tab-icon">◱</span> 2D Template
    </button>
    <button class="tab-btn" data-tab="library" id="tabLib">
      <span class="tab-icon">▦</span> Library
    </button>
  </div>

  <!-- ═══ APP BODY ══════════════════════════════════════════════════════════ -->
  <div class="app-body">

    <!-- ── PANELS WRAP ─────────────────────────────────────────────────── -->
    <div class="panels-wrap">

      <!-- PANEL: 3D Viewport -->
      <div class="panel panel-3d active" id="panel3d">
        <canvas id="canvas3d"></canvas>

        <!-- Floating vertical toolbar -->
        <div class="toolbar-3d">
          <button class="tool-btn" id="resetCameraBtn" title="Reset Camera">⌖</button>
          <button class="tool-btn" id="wireframeToggle" title="Wireframe">⊟</button>
          <div class="tool-color-wrap" title="Color">
            <input type="color" id="colorInput" value="#4a90e2">
            <div class="tool-color-dot" id="colorDot" style="background:#4a90e2;"></div>
          </div>
        </div>
      </div>

      <!-- PANEL: 2D Flat Pattern -->
      <div class="panel panel-2d" id="panel2d">
        <div class="svg-viewer" id="svgViewer">
          <div id="empty2d" class="empty-2d">
            <div class="empty-2d-icon">◱</div>
            <div class="empty-2d-text">Unfold a 3D Model to see the 2D Template here</div>
          </div>
          <div id="svgLayer"></div>
        </div>

        <!-- Zoom pill -->
        <div class="zoom-pill">
          <button class="zoom-btn" id="zoomOut" title="Zoom out">−</button>
          <div class="zoom-divider"></div>
          <button class="zoom-btn zoom-fit-btn" id="zoomFit">⊡</button>
          <div class="zoom-divider"></div>
          <button class="zoom-btn" id="zoomIn" title="Zoom in">+</button>
        </div>
      </div>

      <!-- PANEL: Library -->
      <div class="panel panel-library" id="panelLib">
        <div class="library-topbar">
          <button class="library-upload-btn" id="loadJsonBtn">
            ⬆ Upload JSON Model
          </button>
          <input type="file" id="fileInput" accept=".json" hidden>
        </div>
        <div class="library-grid" id="librarySlots"></div>
      </div>

    </div><!-- end panels-wrap -->

    <!-- ═══ ACTION BAR (always visible) ═══════════════════════════════════ -->
    <div class="action-bar">

       <!-- Mobile: expand dims -->
      <div class="dims-expanded" id="dimsExpanded">
        <div class="dim-field">
          <span class="dim-label">W</span>
          <input type="number" id="dimX" class="dim-input" value="20" min="0.1" step="0.1">
          <span class="dim-unit">cm</span>
        </div>
        <div class="dim-field">
          <span class="dim-label">H</span>
          <input type="number" id="dimY" class="dim-input" value="10" min="0.1" step="0.1">
          <span class="dim-unit">cm</span>
        </div>
        <div class="dim-field">
          <span class="dim-label">D</span>
          <input type="number" id="dimZ" class="dim-input" value="7.5" min="0.1" step="0.1">
          <span class="dim-unit">cm</span>
        </div>
      </div>
    
       <!-- Desktop dims row -->
        <div class="dims-row">
          <div class="dim-field">
            <span class="dim-label">W</span>
            <input type="number" id="dimXd" class="dim-input" value="20" min="0.1" step="0.1">
            <span class="dim-unit">cm</span>
          </div>
          <div class="dim-field">
            <span class="dim-label">H</span>
            <input type="number" id="dimYd" class="dim-input" value="10" min="0.1" step="0.1">
            <span class="dim-unit">cm</span>
          </div>
          <div class="dim-field">
            <span class="dim-label">D</span>
            <input type="number" id="dimZd" class="dim-input" value="7.5" min="0.1" step="0.1">
            <span class="dim-unit">cm</span>
          </div>
        </div>

        <div class="action-bar-spacer"></div>

        <!-- Primary actions -->
        <div class="action-btns">
          <button class="unfold-btn" id="unfoldBtn" disabled>
            ▶ Unfold 3D Model
            <span class="counter-pip" id="counterPip">—</span>
          </button>
          <button class="download-btn" id="downloadBtn" disabled>↓ Download 2D Template</button>
        </div>
      </div>
 

    </div><!-- end action-bar -->

    <!-- ═══ MOBILE BOTTOM NAV ════════════════════════════════════════════ -->
    <div class="bottom-nav" id="bottomNav">
      <div class="bottom-nav-inner">
        <button class="nav-btn active" data-tab="3d">
          <span class="nav-icon">⬡</span>
          <span class="nav-label">3D</span>
        </button>
        <button class="nav-btn" data-tab="2d">
          <span class="nav-icon">◱</span>
          <span class="nav-label">2D</span>
        </button>
        <button class="nav-btn" data-tab="library">
          <span class="nav-icon">▦</span>
          <span class="nav-label">Library</span>
        </button>
      </div>
    </div>

  </div><!-- end app-body -->

  <div class="toast" id="toast"></div>

  <!-- ════ THREE.JS ═══════════════════════════════════════════════════════ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- Tab switching logic (must be before module script) -->
  <script>
    // Global tab switcher — called from app.js too
    function switchTab(name) {
      // Panels
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      const target = { '3d': 'panel3d', '2d': 'panel2d', 'library': 'panelLib' }[name];
      if (target) document.getElementById(target).classList.add('active');

      // Desktop tabs
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === name);
      });

      // Mobile nav
      document.querySelectorAll('.nav-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === name);
      });

      // Trigger canvas resize when switching to 3D
      if (name === '3d') {
        setTimeout(() => {
          window.dispatchEvent(new Event('resize'));
        }, 50);
      }
    }

    // Wire up all tab buttons
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.tab-btn, .nav-btn').forEach(btn => {
        btn.addEventListener('click', () => switchTab(btn.dataset.tab));
      });
    });
  </script>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
