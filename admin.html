<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACM Toolbox - Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script>
    window.API_URL = 'https://acm-unfolder-api-production.h24111.workers.dev';
  </script>
</head>
<body>
  <header class="header">
    <h1>⚙️ Admin Panel</h1>
    <div class="header-controls">
      <button class="btn secondary" onclick="window.location.href='./dashboard.html'">← Dashboard</button>
      <button class="btn logout" id="logoutBtn">← Logout</button>
    </div>
  </header>

  <main>
    <div class="admin-container">
      <section class="admin-section">
        <h2>👤 Register New User</h2>
        <p>Manually create accounts for clients. Use secure passwords.</p>
        
        <form id="registerForm" class="admin-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" required placeholder="e.g. client_name">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="Strong password">
          </div>
          <div class="form-group checkbox">
            <input type="checkbox" id="isAdmin">
            <label for="isAdmin">Give Admin Privileges</label>
          </div>
          <button type="submit" class="btn primary">Register User</button>
        </form>
        <div id="registerMsg" class="admin-msg"></div>
      </section>

      <section class="admin-section">
        <h2>⚡ Quick Actions</h2>
        <div class="admin-actions-grid">
          <div class="action-card">
            <h3>Reset Limits</h3>
            <p>Reset all rate limits (use with caution)</p>
            <button class="btn danger" id="resetLimitsBtn">Reset All</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="auth.js"></script>
  <script>
    // Check if user is admin on page load
    window.addEventListener('load', () => {
      if (!isAuthenticated() || !isAdmin()) {
        console.log('[ADMIN] Access denied - not authenticated or not admin');
        alert('Access denied. Admin privileges required');
        window.location.href = './login.html';
        return;
      }

      // Setup logout button
      document.getElementById('logoutBtn').addEventListener('click', () => {
        if (confirm('Are you sure you want to logout?')) {
          logoutUser();
        }
      });

      // Setup register user button
      document.getElementById('regUserBtn').addEventListener('click', registerUser);

      // Setup reset limits button
      document.getElementById('resetLimitsBtn').addEventListener('click', () => {
        if (confirm('Are you sure you want to reset ALL rate limits? This cannot be undone.')) {
          alert('Functionality coming soon (requires implementation of resetAll)');
        }
      });
    });
  </script>

  <style>
    .admin-container {
      max-width: 800px;
      width: 100%;
      padding: 20px;
    }
    .admin-section {
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 16px;
      margin-bottom: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    .admin-section h2 {
      margin-bottom: 20px;
      color: #333;
    }
    .admin-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .form-group label {
      font-weight: 500;
      color: #555;
    }
    .form-group input[type="text"],
    .form-group input[type="password"] {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .form-group.checkbox {
      flex-direction: row;
      align-items: center;
      gap: 10px;
    }
    .admin-msg {
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
    }
    .admin-msg.success {
      background: #d4edda;
      color: #155724;
    }
    .admin-msg.error {
      background: #f8d7da;
      color: #721c24;
    }
    .admin-actions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    .action-card {
      padding: 20px;
      border: 1px solid #eee;
      border-radius: 12px;
      text-align: center;
    }
    .action-card h3 {
      font-size: 18px;
      margin-bottom: 10px;
    }
    .action-card p {
      font-size: 14px;
      color: #666;
      margin-bottom: 15px;
    }
    .action-card .btn {
      width: 100%;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
    }
    .action-card .btn.danger {
      background: #ff6b6b;
      color: white;
      border: none;
    }
  </style>
</body>
</html>
